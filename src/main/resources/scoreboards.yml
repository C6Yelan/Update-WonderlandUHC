# 記分板文字格式說明:
# - 每一行可使用 MiniMessage，例如 <white>文字</white>、<green>{placeholder}</green>。
# - 舊版 Bukkit 色碼不會被當作顏色解析，請改用 MiniMessage。
# - {online_players}、{game_time} 這類大括號內容是 WonderlandUHC placeholder，請保留需要的名稱。

#記分板方面你可以自行更改 Default 區塊內的文本。

#以下為所有記分板的代轉換字元
# Lobby 方面:
  # {ign} 每個玩家各自的名字
  # {online_players} 伺服器玩家總數
  # {teleport_in} 傳送倒數時間
  # {team_size} 隊伍大小
  # {max_players} 玩家數量限制
# Starting 方面:
  # 包含所有Lobby方面的代轉換字元
  # {start_in} 遊戲開始倒數時間
  # {teleporting} 尚未傳送的隊伍數量
  # {teleported} 已傳送隊伍數量
# Spectator_Solo、Spectator_Teams 方面:
  # {ign} 每個玩家各自的名字
  # {remaining} 存活玩家數量
  # {all} 本場遊玩玩家數量
  # {alive_teams} 存活隊伍數量
  # {all_teams} 本場總隊伍數量
  # {spectators} 觀察者數量
  # {border_size} 邊界大小(直徑)
  # {border_size/2} 邊界半徑
  # {shrink_in} 邊界收縮倒數時間
  # {game_time} 遊戲時間
# Staff_Solo、Staff_Teams 方面:
  # 包含所有Spectator_Solo方面的代轉換字元
  # {tps} 伺服器順暢程度(最高20)
  # {free_ram} 伺服器記憶體使用量
# Player_Solo 方面:
  # 包含所有 Spectator_Solo 方面的代轉換字元
  # {kills} 玩家擊殺數
# Player_Teams 方面:
  # 包含所有 Player_Solo 方面的代轉換字元
  # {team_kills} 隊伍擊殺數
  # {team_name} 隊伍名稱
  # {team_color} 隊伍顏色(顏色代碼)
Default:
  Lobby:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>玩家數量: </white><green>{online_players}/{max_players}</green>"
    - "<white>隊伍大小: </white><green>{team_size} 人一隊</green>"
    - "    "
    - "<white>將於</white><green>{teleport_in}</green><white>後傳送玩家</white>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Starting:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>遊戲倒數: </white><green>{start_in}</green>"
    - "<white> </white>"
    - "<white>已傳送: </white><green>{teleported}</green>"
    - "<white>未傳送: </white><green>{teleporting}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Spectator_Solo:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>時間: </white><green>{game_time}</green>"
    - "<white>玩家: </white><green>{remaining}/{all}</green>"
    - " "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Spectator_Teams:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>時間: </white><green>{game_time}</green>"
    - "<white>玩家: </white><green>{remaining}/{all}</green>"
    - " "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Staff_Solo:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>順暢度</white><gray>(TPS)</gray><white>: </white><green>{tps}</green>"
    - "<white>記憶體</white><gray>(RAM)</gray><white>: </white><green>{free_ram}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>時間: </white><green>{game_time}</green>"
    - "<white>玩家: </white><green>{remaining}/{all}</green>"
    - " "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Staff_Teams:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>順暢度</white><gray>(TPS)</gray><white>: </white><green>{tps}</green>"
    - "<white>記憶體</white><gray>(RAM)</gray><white>: </white><green>{free_ram}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>時間: </white><green>{game_time}</green>"
    - "<white>玩家: </white><green>{remaining}/{all}</green>"
    - " "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Player_Solo:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>遊戲時間: </white><green>{game_time}</green>"
    - "<white>玩家數量: </white><green>{remaining}/{all}</green>"
    - "  "
    - "<white>擊殺數: </white><green>{kills}</green>"
    - " "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
  Player_Teams:
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
    - "<white>遊戲時間: </white><green>{game_time}</green>"
    - "<white>玩家數量: </white><green>{remaining}/{all}</green>"
    - "<white>隊伍數量: </white><green>{alive_teams}/{all_teams}</green>"
    - "  "
    - "<white>擊殺數: </white><green>{kills}</green>"
    - "<white>隊伍擊殺數: </white><green>{team_kills}</green>"
    - "  "
    - "<white>邊界大小: </white><green>{border_size}x{border_size}</green>"
    - "<white>收縮倒數: </white><green>{shrink_in}</green>"
    - "<gray><strikethrough>*----------------------*</strikethrough></gray>"
