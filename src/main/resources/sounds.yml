#插件裡面所有的聲音都可以在此作調整
#聲音列表: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html

#特別注意，有些聲音可能在之前的版本不存在 (例如 1.15 的蜜蜂叫聲在之前版本不存在)
#會導致載入錯誤，因此在設定聲音時請特別注意。

#音效參數:
#  音效  音量  音調
# ENTITY_GENERIC_DRINK 1.0F 1.0F

#備註:
#  特殊模式(Scenario) 的音效放在 scenarios.yml 裡面，參數與設定方式與這邊相同。
Commands:
  Spec_Toggle: ENTITY_GENERIC_DRINK 1.0F 1.0F
  Respawn: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  Set_Spawn: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  Staff_On: ENTITY_PLAYER_BURP 1.0F 1.0F
  Staff_Off: ENTITY_ENDERMAN_TELEPORT 1.0F 1.0F
  Top_Kills: ENTITY_EXPERIENCE_ORB_PICKUP 1.0F 1.0F
  Team_Chat_On: ENTITY_PLAYER_BURP 1.0F 1.0F
  Team_Chat_Off: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  Team_Created: UI_BUTTON_CLICK 1.0F 1.0F
  Team_Info: ENTITY_PLAYER_BURP 1.0F 1.0F
  Send_Coords: ENTITY_EXPERIENCE_ORB_PICKUP 1.0F 1.0F
Host:
  Start_Creating_World: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  World_Created: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  Inventory_Edited: ENTITY_PLAYER_SPLASH 1.0F 1.0F
  Golden_Head_Created: ENTITY_GENERIC_DRINK 1.0F 1.0F
  Clear_Enabled_Scenarios: BLOCK_SAND_BREAK 1.0F 1.0F
  Scenario_Toggled: BLOCK_NOTE_BLOCK_PLING 1.0F 1.0F
Game:
  Invincible_End: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  Death: ENTITY_FIREWORK_ROCKET_LARGE_BLAST 1.0F 1.0F
  Item_Disabled: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  Cant_Join_Nether: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  Win: ENTITY_WITHER_DEATH 1.0F 1.0F
Countdown:
  Lobby:
    Start: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
    Tick: ENTITY_CHICKEN_EGG 1.0F 1.0F
    Run: BLOCK_NOTE_BLOCK_PLING 1.0F 1.0F
  Start:
    Tick: none
    Run: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  Border:
    Tick: BLOCK_NOTE_BLOCK_HAT 1.0F 1.0F
    Run: none
  Damage:
    Tick: none
    Run: BLOCK_ANVIL_USE 1.0F 1.0F
  Pvp:
    Tick: none
    Run: BLOCK_NOTE_BLOCK_PLING 1.0F 1.0F
  FinalHeal:
    Tick: none
    Run: ENTITY_GENERIC_EAT 1.0F 1.0F
  NetherClose:
    Tick: none
    Run: BLOCK_WOODEN_DOOR_CLOSE 1.0F 1.0F
Tutorial:
  Finished: ENTITY_PLAYER_LEVELUP 1.0F 1.0F
  Next_Section: UI_BUTTON_CLICK 1.0F 1.0F
  Cancelled: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
