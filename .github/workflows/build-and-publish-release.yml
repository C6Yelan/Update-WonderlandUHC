name: "Build And Publish Release"

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
          cache-provider: basic

      - name: Execute Gradle build
        run: gradle shadowJar --no-daemon
        env:
          PRIVATE_REPO_USERNAME: ${{ secrets.PRIVATE_REPO_USERNAME }}
          PRIVATE_REPO_PASSWORD: ${{ secrets.PRIVATE_REPO_PASSWORD }}

      - name: Get Plugin Version From build.gradle And Store It
        run: |
          release_version="$(gradle properties -q | awk '/^version:/ { print $2; exit }')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Find Output Jar Path And Store As Env
        run: |
          release_jar_path="$(find ./build/libs -type f -name '*.jar' | sort | head -n 1)"
          test -n "$release_jar_path"
          echo "RELEASE_JAR_PATH=$release_jar_path" >> "$GITHUB_ENV"
          echo "RELEASE_JAR_NAME=$(basename "$release_jar_path")" >> "$GITHUB_ENV"

      - name: Create Draft Release And Upload Jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${RELEASE_JAR_PATH}" \
            --draft \
            --title "${RELEASE_VERSION}" \
            --notes "WonderlandUHC ${RELEASE_VERSION}"
