#物品設定(在各式各樣的設定介面)
#Type -> 物品ID
#Slot -> 在背包中的位置(記得，數字是從0開始，所以假裝我有一個介面是27個，位置就是從0~26)
#Name -> 物品名稱
#Lore -> 物品說明文字

Lobby:
  Options:
    Type: BOOK
    Slot: 0
    Name: "<yellow>遊戲設定</yellow>"
    Lore:
      - "<gray>包含大大小小的遊戲設定可供調整。</gray>"
  Leave:
    Type: REDSTONE
    Slot: 8
    Name: "<red>回到大廳</red>"
    Lore:
      - "<gray>返回大廳伺服器。</gray>"
  Teams:
    Type: PAPER
    Slot: 2
    Name: "<gold>隊伍選擇器</gold>"
    Lore:
      - "<gray>加入已公開的隊伍當中。</gray>"
  Team_Settings:
    Type: REDSTONE_TORCH_ON
    Slot: 4
    Name: "<green>隊伍設定</green>"
    Lore:
      - "<gray>編輯隊伍方面相關數值。</gray>"
Spectator:
  Overworld_Players:
    Type: PAPER
    Slot: 0
    Name: "<aqua>主世界存活玩家</aqua>"
    Lore:
      - "<gray>查看所有位於主世界的存活玩家。</gray>"
  Nether_Players:
    Type: NETHER_STALK
    Slot: 1
    Name: "<red>地獄存活玩家</red>"
    Lore:
      - "<gray>查看所有位於地獄的存活玩家。</gray>"
  Random_Teleport:
    Type: ENDER_PORTAL_FRAME
    Slot: 2
    Name: "<yellow>傳送到隨機玩家</yellow>"
    Lore:
      - "<gray>隨機傳送至一位存活玩家。</gray>"
  Toggle_Gamemode:
    Type: CARROT_STICK
    Slot: 3
    Name: "<gold>切換到觀察者模式</gold>"
    Lore:
      - "<gray>功能與 /gamemode spectator 相同。</gray>"
  Teleport_Zerozero:
    Type: BOWL
    Slot: 4
    Name: "<aqua>傳送至中心點</aqua>"
    Lore:
      - "<gray>傳送至遊戲主世界的目前比賽中心。</gray>"
Staff_Addon:
  Staff_Options:
    Type: COMPARATOR
    Slot: 7
    Name: "<red>管理員設定</red>"
    Lore:
      - "<gray>包含一切方便管理遊戲的小工具。</gray>"
