Armor_Vs_Health:
  Type: DIAMOND_CHESTPLATE
  Name: "<red>裝備的代價</red><gray>(ArmorVsHealth)</gray>"
  Description:
    - "玩家的裝備值每增加半格，最大血量便會扣除半格"
    - "且扣除的血量不會在玩家脫裝後恢復。"
  Apply_Within_Seconds_After_Respawned: 10
  Warn_Msg:
    - "<dark_red><strikethrough>――――――――――――――――――――――――――――――――――――――――――――</strikethrough></dark_red>"
    - " "
    - "<red>裝備代價的效果將會於 {fancy-time} 後生效</red>"
    - "<red>請在時間內重新配置你的裝備。</red>"
    - " "
    - "<dark_red><strikethrough>――――――――――――――――――――――――――――――――――――――――――――</strikethrough></dark_red>"
Absorption_Less:
  Type: GOLD_NUGGET
  Name: "<red>無吸收</red><gray>(Absorptionless)</gray>"
  Description:
    - "吃下金蘋果時，玩家將不會獲得額外的吸收血量。"
Backpack:
  Type: ENDER_CHEST
  Name: "<aqua>隊伍背包</aqua><gray>(BackPack)</gray>"
  Description:
    - "玩家可透過 /{cmd} 指令與隊友共享資源。"
  Cant_Use_Msg: "<red>本場次並沒有開啟隊伍背包，因此本指令無法使用。</red>"
  #隊伍背包的大小 (必須為 9 的倍數)
  Size: 27
Bench_Blitz:
  Type: CRAFTING_TABLE
  Name: "<dark_green>匠魂之心</dark_green><gray>(BenchBlitz)</gray>"
  Description:
    - "整場遊戲，玩家只能製作一個工作台。"
  Workbench_Created: "<gray>[<dark_green>匠魂之心</dark_green>]</gray> <red>由於匠魂之心模式的限制，你無法製作超過一個工作台。</red>"
  Workbench_Created_Sound: ENTITY_PLAYER_LEVELUP 1.0F 2.0F
Blood_Diamonds:
  Type: DIAMOND
  Name: "<dark_red>血鑽石</dark_red><gray>(BloodDiamond)</gray>"
  Description:
    - "每挖掘一個鑽石礦，玩家皆會扣除 {heal} 滴血。"
  #挖掘鑽石礦要扣除的血量
  Damage: 1
Bow_Less:
  Type: BOW
  Name: "<red>無弓箭模式</red><gray>(Bowless)</gray>"
  Description:
    - "弓箭將無法使用。"
Cut_Clean:
  Type: IRON_INGOT
  Name: "<yellow>礦物免燒</yellow><gray>(CutClean)</gray>"
  Description:
    - "礦物將直接以錠的形式掉落，生物也會直接掉落烤熟的食物。"
Damage_Dogers:
  Type: TNT
  Name: "<dark_red>犧牲者</dark_red><gray>(DamageDogers)</gray>"
  Description:
    - "遊戲中前 {amount} 位受到傷害的玩家，將會立即死亡。"
  #共有多少人要成為犧牲者
  Amount: 3
  Death_Cause_This: "<gray>[<dark_red>犧牲者</dark_red>]</gray> <dark_red><bold>{player}</bold></dark_red> <red><bold>成為了本場次的犧牲者，目前犧牲者仍然還缺 </bold></red><dark_red><bold>{amount}</bold></dark_red> <red><bold>位。</bold></red>"
  Death_Cause_This_Sound: UI_BUTTON_CLICK 1.0F 1.0F
Diamond_Less:
  Type: DIAMOND_ORE
  Name: "<red>無鑽石模式</red><gray>(DiamondLess)</gray>"
  Description:
    - "你無法挖掘鑽石，但可以透過箱子找到的鑽石製作物品。"
Double_Or_Nothing:
  Type: BONE
  Name: "<yellow>得失參半</yellow><gray>(DoubleOrNothing)</gray>"
  Description:
    - "以下方塊可能會掉落以雙倍數量掉落，或者一無所有。"
    - "{materials}"
  #此模式要套用到那些方塊上
  Trigger_Blocks:
    - DIAMOND_ORE
    - GOLD_ORE
  Nothing_Sound: ENTITY_CHICKEN_EGG 1.0F 1.0F
Fast_Obsidian:
  Type: OBSIDIAN
  Name: "<yellow>脆弱黑石</yellow><gray>(FastObsidian)</gray>"
  Description:
    - "黑曜石的挖掘速度將會提升。"
Fast_Smelting:
  Type: FURNACE
  Name: "<yellow>快速燒烤</yellow><gray>(FastSmelting)</gray>"
  Description:
    - "熔爐燒製的速度將會加倍。"
Fire_Less:
  Type: FLINT_AND_STEEL
  Name: "<gold>抗火</gold><gray>(Fireless)</gray>"
  Description:
    - "岩漿及任何火焰不會對玩家產生任何傷害。"
Food_Neophobia:
  Type: COOKED_COD
  Name: "<dark_green>貫徹始終</dark_green><gray>(Foodneophobia)</gray>"
  Description:
    - "玩家整場遊戲，只能食用第一次吃下的東西。"
    - "(藥水，金蘋果，牛奶除外)"
  First_Eat: "<gray>[<dark_green>貫徹始終</dark_green>]</gray> <red><bold>注意，貫徹始終模式的效果，從今以後你只能食用 </bold></red><gold><bold>{foodtype}</bold></gold><red><bold>。</bold></red>"
  Just_Can_Eat: "<gray>[<dark_green>貫徹始終</dark_green>]</gray> <red>由於本場的貫徹始終效果限制，你無法食用其他類別食物，你只能食用 </red><gold>{foodtype}</gold><red>。</red>"
  First_Eat_Sound: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  Just_Can_Eat_Sound: UI_BUTTON_CLICK 1.0F 1.0F
Gold_Less:
  Type: GOLD_ORE
  Name: "<red>無黃金模式</red><gray>(Goldless)</gray>"
  Description:
    - "你無法挖掘黃金，但可以透過箱子找到的黃金製作物品。"
Hasty_Boys:
  Type: GOLDEN_PICKAXE
  Name: "<yellow>工具人</yellow><gray>(HastyBoys)</gray>"
  Description:
    - "所有工具在合成時，都會自帶效率III。"
Horse_Less:
  Type: SADDLE
  Name: "<red>時速限制</red><gray>(Horseless)</gray>"
  Description:
    - "你無法騎馬。"
Iron_Man:
  Type: IRON_CHESTPLATE
  Name: "<aqua>鋼鐵人</aqua><gray>(IronMan)</gray>"
  Description:
    - "只要在最終回血之前沒有受傷，即可增加額外的 {heal} 滴血。(最大血量)"
  #鋼鐵人要額外給予多少血量
  Extra_Heal: 4
  Damage_Before_Final_Heal: "<gray>[<aqua>鋼鐵人</aqua>]</gray> <red><bold>由於你在最終回血前受傷了，因此你錯失了成為鋼鐵人的機會。</bold></red>"
Less_Bow_Damage:
  Type: BOW
  Name: "<aqua>弓箭減傷</aqua><gray>(LessBowDamage)</gray>"
  Description:
    - "弓箭的傷害將會降低 {percent}%。"
  #減傷程度 (%)
  Decrease_Percent: 50
Limitations:
  Type: BARRIER
  Name: "<dark_green>礦物限量</dark_green><gray>(Limitations)</gray>"
  Description:
    - "每場遊戲，你最多只能挖掘 {diamond-limit} 個鑽石、{gold-limit} 個黃金及 {iron-limit} 個鐵礦。"
  Reached_Limit: "<gray>[<dark_green>礦物限量</dark_green>]</gray> <red>抱歉，你最多只能挖掘 {amount} 個 {block}。</red>"
  Cant_Mine_More: "<gray>[<dark_green>礦物限量</dark_green>]</gray> <red><bold>你已達到 </bold></red><gold><bold>{block}</bold></gold> <red><bold>的挖掘上限 ({amount}個)，從現在起你將無法再從此方塊獲得任何掉落物。</bold></red>"
  Reached_Limit_Sound: UI_BUTTON_CLICK 1.0F 1.0F
  Cant_Mine_More_Sound: BLOCK_NOTE_BLOCK_BASS 1.0F 1.0F
  #礦物的限制數量
  Limits:
    Iron: 64
    Gold: 32
    Diamond: 16
Lucky_Leaves:
  Type: DEAD_BUSH
  Name: "<yellow>藏金於樹</yellow><gray>(LuckyLeaves)</gray>"
  Description:
    - "金蘋果將有 {percent}% 的機率從樹上掉落。"
  #金蘋果掉落機率
  Golden_Apple_Percent: 1
No_Clean:
  Type: APPLE
  Name: "<aqua>撿頭防止機制</aqua><gray>(NoClean)</gray>"
  Description:
    - "每擊殺一位玩家，玩家都會擁有 {fancy-time} 的無敵時間。"
  #無敵時間
  Invincible_Seconds: 15
No_Enchant:
  Type: ENCHANTING_TABLE
  Name: "<red>符文殺手</red><gray>(NoEnchant)</gray>"
  Description:
    - "玩家將無法附魔。"
No_Fall:
  Type: FEATHER
  Name: "<yellow>掉落免傷</yellow><gray>(NoFall)</gray>"
  Description:
    - "玩家將不會受到任何摔落傷害。"
Potion_Less:
  Type: POTION
  Name: "<red>無藥水模式</red><gray>(Potionless)</gray>"
  Description:
    - "你無法使用/製作任何藥水。"
Rod_Less:
  Type: FISHING_ROD
  Name: "<red>無釣竿模式</red><gray>(Rodless)</gray>"
  Description:
    - "玩家將無法使用釣竿。"
Shift_Kill:
  Type: LEATHER_BOOTS
  Name: "<aqua>殺手之心</aqua><gray>(ShiftKill)</gray>"
  Description:
    - "玩家若沒有在蹲下的狀態擊殺他人"
    - "將會扣除當時血量一半的生命值。"
Silk_Web:
  Type: COBWEB
  Name: "<yellow>絲綢之網</yellow><gray>(SilkWeb)</gray>"
  Description:
    - "使用剪刀破壞蜘蛛網將會直接掉落蜘蛛網。"
    - "(如果關閉，使用任何工具挖掘都只會掉落線)"
Soup:
  Type: MUSHROOM_STEW
  Name: "<aqua>濃湯</aqua><gray>(Soup)</gray>"
  Description:
    - "右鍵點擊蘑菇湯，將會立即回復 {heal} 滴血。"
  #一碗湯能恢復多少血量
  Regen_Health: 7
Swap_Inventory:
  Type: IRON_CHESTPLATE
  Name: "<aqua>生死之交</aqua><gray>(SwapInventory)</gray>"
  Description:
    - "玩家將會與被擊殺的人交換裝備及背包物品。"
Switcheroo:
  Type: ENDER_PEARL
  Name: "<aqua>飄疑不定</aqua><gray>(Switcheroo)</gray>"
  Description:
    - "玩家將會與被射中的人交換位置。"
  Switch_Sound: ENTITY_ENDERMAN_TELEPORT 1.0F 1.0F
Timber:
  Type: OAK_SAPLING
  Name: "<yellow>快速伐木</yellow><gray>(Timber)</gray>"
  Description:
    - "只需挖掘一塊木頭，整棵樹就會直接被破壞。"
Time_Bomb:
  Type: CHEST
  Name: "<aqua>死亡棺材</aqua><gray>(TimeBomb)</gray>"
  Description:
    - "玩家死亡時，會將所有物品裝入大箱子中"
    - "並於 {fancy-time} 後爆炸。"
  #箱子要於幾秒後爆炸
  Explode_After_Seconds: 30
  #爆炸是否要摧毀方塊
  Explode_Blocks: false
  #爆炸威力
  Explosion_Power: 3
  Exploded: "<dark_gray>[<red>死亡棺材</red>]</dark_gray> <gray>{player} 的棺材爆炸了。</gray>"
  Warn_Sound: ENTITY_PLAYER_LEVELUP 2.0F 2.0F
  Warn_Sound_Danger: ENTITY_PLAYER_LEVELUP 2.0F 5.0F
Triple_Arrow:
  Type: ARROW
  Name: "<aqua>三矢弓模式</aqua><gray>(TripleArrow)</gray>"
  Description:
    - "一次射擊會同時發射三發箭矢。"
Triple_Ores:
  Type: LAPIS_ORE
  Name: "<yellow>三倍礦物</yellow><gray>(TripleOres)</gray>"
  Description:
    - "礦物掉落量將乘以 3 倍。"
Vanilla_Plus:
  Type: FLINT
  Name: "<yellow>豐收</yellow><gray>(VanillaPlus)</gray>"
  Description:
    - "礫石掉落碎石的機率將會加倍。"
Vein_Miners:
  Type: DIAMOND_PICKAXE
  Name: "<yellow>連鎖挖礦</yellow><gray>(VeinMiners)</gray>"
  Description:
    - "只要挖掘一個礦物，與其相連的礦物也會跟著被破壞。"
Fragile_Rods:
  Type: FISHING_ROD
  Name: "<red>腐蝕釣竿</red><gray>(FragileRods)</gray>"
  Description:
    - "只要釣竿「甩出去」，就會扣一次耐久度"
